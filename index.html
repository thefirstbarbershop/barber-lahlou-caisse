<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARBER LAHLOU - Caisse Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } body { background: white; margin: 0; padding: 0; } }
        .print-only { display: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pulse-green { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col overflow-hidden">

    <div id="printZone" class="print-only text-black bg-white w-full max-w-[80mm] mx-auto p-4 text-sm font-mono leading-tight"></div>

    <!-- MODAL RAPPORT -->
    <div id="reportModal" class="no-print fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4 hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="bg-slate-900 p-5 text-white flex justify-between items-center">
                <h2 class="text-xl font-bold"><i class="fa-solid fa-chart-pie mr-2 text-blue-400"></i> Rapport Cloud</h2>
                <button onclick="closeReport()" class="hover:bg-slate-800 p-2 rounded-full"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 bg-slate-50" id="reportContent"></div>
            <div class="p-4 bg-white border-t flex justify-end">
                <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-lg font-bold"><i class="fa-solid fa-print mr-2"></i> Imprimer Rapport</button>
            </div>
        </div>
    </div>

    <!-- MODAL DIALOG -->
    <div id="customDialog" class="no-print fixed inset-0 bg-black/70 z-[100] flex justify-center items-center p-4 hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
            <div id="dialogIcon" class="text-4xl mb-4"></div>
            <h3 id="dialogTitle" class="text-xl font-bold text-slate-800 mb-2"></h3>
            <div id="dialogMessage" class="text-slate-600 mb-6"></div>
            <div class="flex gap-3 w-full" id="dialogButtons"></div>
        </div>
    </div>

    <!-- APP PRINCIPALE -->
    <div class="no-print flex flex-col h-full">
        <header class="bg-slate-900 text-white shadow-md z-10 flex flex-col">
            <div class="p-3 md:p-4 flex justify-between items-center border-b border-slate-700">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-scissors text-blue-400 text-2xl"></i>
                    <h1 class="text-xl md:text-2xl font-bold tracking-wider uppercase">BARBER LAHLOU</h1>
                    <div id="syncIndicator" class="flex items-center gap-1 text-[10px] md:text-xs bg-slate-800 text-slate-400 px-2 py-1 rounded-full border border-slate-700">
                        <i class="fa-solid fa-rotate fa-spin"></i> Sync...
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="location.reload()" class="bg-slate-800 p-2 rounded-lg text-slate-400 hover:text-white" title="Refresh Sync">
                        <i class="fa-solid fa-arrows-rotate"></i>
                    </button>
                    <button onclick="openReport()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 md:px-4 py-2 rounded-lg font-bold flex items-center gap-2 shadow-lg text-sm md:text-base">
                        <i class="fa-solid fa-chart-column"></i> <span class="hidden sm:inline">Caisse</span>
                    </button>
                </div>
            </div>
            
            <div class="bg-slate-800 px-4 py-2 flex items-center gap-2 overflow-x-auto hide-scrollbar" id="workerSelection">
                <span class="text-sm font-semibold text-slate-500 mr-2 uppercase text-[10px]">Staff:</span>
            </div>
        </header>

        <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <section class="w-full md:w-2/3 p-4 md:p-6 overflow-y-auto">
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4" id="servicesGrid"></div>
            </section>

            <section class="w-full md:w-1/3 bg-white border-t md:border-t-0 md:border-l border-gray-200 flex flex-col h-[55vh] md:h-auto shadow-2xl">
                <div class="p-3 border-b border-gray-200 bg-blue-50 flex items-center justify-between">
                    <div>
                        <h3 class="font-bold text-blue-900 text-sm">Ticket <span id="ticketNumberDisplay">#0001</span></h3>
                        <p class="text-xs text-blue-600 font-semibold uppercase"><i class="fa-solid fa-user"></i> <span id="activeWorkerDisplay">SOUHAIL</span></p>
                    </div>
                    <div class="text-right">
                        <p id="clockDisplay" class="text-[10px] text-slate-500 font-mono"></p>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-2 bg-white" id="cartContainer"></div>

                <div class="bg-slate-50 p-4 border-t border-gray-200">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-slate-500 font-bold uppercase text-xs tracking-widest">Total à payer</span>
                        <span class="text-3xl font-black text-slate-900"><span id="cartTotal">0.00</span> <span class="text-sm">MAD</span></span>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <button onclick="handlePayment('Espèces')" class="bg-green-600 hover:bg-green-700 text-white p-4 rounded-xl font-bold flex flex-col items-center gap-1 shadow-md active:scale-95 transition-all">
                            <i class="fa-solid fa-money-bill-wave text-xl"></i> <span>Espèces</span>
                        </button>
                        <button onclick="handlePayment('Carte')" class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold flex flex-col items-center gap-1 shadow-md active:scale-95 transition-all">
                            <i class="fa-solid fa-credit-card text-xl"></i> <span>Carte TPE</span>
                        </button>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="confirmClearCart()" class="w-1/3 bg-white border border-red-100 text-red-500 p-2 rounded-xl font-bold text-xs uppercase">Annuler</button>
                        <button onclick="showPrintPreview()" class="w-2/3 bg-slate-800 text-white p-2 rounded-xl font-bold text-xs uppercase flex items-center justify-center gap-2"><i class="fa-solid fa-print"></i> Ticket</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURATION FIREBASE EXACTE BEDELNA L'API KEY
        const firebaseConfig = {
            apiKey: "AIzaSyBdNRfkM94j2NWCBnnnnjYnuzjdfwKdIIk",
            authDomain: "barber-lahlou-caisse.firebaseapp.com",
            projectId: "barber-lahlou-caisse",
            storageBucket: "barber-lahlou-caisse.firebasestorage.app",
            messagingSenderId: "637483895643",
            appId: "1:637483895643:web:3aa1f4ef4463b54587a87e",
            measurementId: "G-X4FR70Q6JK"
        };

        const WORKERS = ['SOUHAIL', 'HAITAM', 'FAYSAL', 'HATIM'];
        const SERVICES = [
            { id: 1, name: 'Coupe Homme', price: 50, color: 'bg-blue-50 border-blue-200 text-blue-700' },
            { id: 2, name: 'Coupe + Barbe', price: 70, color: 'bg-blue-50 border-blue-200 text-blue-700' },
            { id: 3, name: 'Tracé Barbe', price: 30, color: 'bg-blue-50 border-blue-200 text-blue-700' },
            { id: 4, name: 'Coupe Enfant', price: 40, color: 'bg-green-50 border-green-200 text-green-700' },
            { id: 5, name: 'Coupe Femme', price: 100, color: 'bg-pink-50 border-pink-200 text-pink-700' },
            { id: 6, name: 'Brushing Court', price: 60, color: 'bg-pink-50 border-pink-200 text-pink-700' },
            { id: 7, name: 'Brushing Long', price: 100, color: 'bg-pink-50 border-pink-200 text-pink-700' },
            { id: 8, name: 'Coloration', price: 250, color: 'bg-purple-50 border-purple-200 text-purple-700' },
            { id: 9, name: 'Soin Kératine', price: 500, color: 'bg-purple-50 border-purple-200 text-purple-700' }
        ];

        let activeWorker = WORKERS[0];
        let cart = [];
        let dailySales = [];
        let db;
        const appId = "barber-lahlou-caisse";

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            db = getFirestore(app);

            // SYNC REAL-TIME
            onAuthStateChanged(auth, (user) => {
                const syncEl = document.getElementById('syncIndicator');
                if (user) {
                    const salesRef = collection(db, 'artifacts', appId, 'public', 'data', 'sales');
                    const todayStr = new Date().toISOString().split('T')[0];
                    
                    const q = query(salesRef, where("date", "==", todayStr));
                    
                    onSnapshot(q, (snapshot) => {
                        dailySales = [];
                        snapshot.forEach((doc) => dailySales.push({ id: doc.id, ...doc.data() }));
                        
                        syncEl.innerHTML = `<i class="fa-solid fa-cloud-check text-green-400"></i> Cloud Sync: ${dailySales.length} tickets`;
                        syncEl.className = "flex items-center gap-1 text-[10px] md:text-xs bg-green-900/20 text-green-400 px-2 py-1 rounded-full border border-green-800/30";
                        
                        updateTicketNumber();
                        if(!document.getElementById('reportModal').classList.contains('hidden')) openReport();
                    }, (err) => {
                        console.error("Firestore Error:", err);
                        syncEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-400"></i> Err Sync`;
                    });
                } else {
                    signInAnonymously(auth).catch(err => {
                        console.error("Auth Error:", err);
                        const syncEl = document.getElementById('syncIndicator');
                        syncEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-400"></i> API Key Error`;
                        syncEl.className = "flex items-center gap-1 text-[10px] md:text-xs bg-red-900/20 text-red-400 px-2 py-1 rounded-full border border-red-800/30";
                    });
                }
            });
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }

        // UI ACTIONS
        function updateTicketNumber() {
            const num = dailySales.length + 1;
            document.getElementById('ticketNumberDisplay').innerText = '#' + String(num).padStart(4, '0');
        }

        window.setActiveWorker = (w) => { activeWorker = w; renderWorkers(); renderCart(); };

        function renderWorkers() {
            const container = document.getElementById('workerSelection');
            container.innerHTML = '<span class="text-sm font-semibold text-slate-500 mr-2 uppercase text-[10px]">Staff:</span>';
            WORKERS.forEach(w => {
                const btn = document.createElement('button');
                btn.onclick = () => window.setActiveWorker(w);
                btn.className = `px-4 py-2 rounded-full font-bold text-xs transition-all ${activeWorker === w ? 'bg-blue-500 text-white shadow-lg scale-105' : 'bg-slate-700 text-slate-400'}`;
                btn.innerHTML = w;
                container.appendChild(btn);
            });
            document.getElementById('activeWorkerDisplay').innerText = activeWorker;
        }

        function renderServices() {
            const container = document.getElementById('servicesGrid');
            SERVICES.forEach(s => {
                const btn = document.createElement('button');
                btn.className = `${s.color} border rounded-2xl p-4 h-28 flex flex-col justify-center items-center shadow-sm active:scale-95 transition-all`;
                btn.onclick = () => window.addToCart(s);
                btn.innerHTML = `<span class="font-bold text-center leading-tight mb-2 text-sm">${s.name}</span><span class="text-lg font-black bg-white/50 px-3 py-0.5 rounded-full">${s.price} <small>Dh</small></span>`;
                container.appendChild(btn);
            });
        }

        window.addToCart = (s) => {
            const item = cart.find(i => i.id === s.id);
            if (item) item.qty++; else cart.push({ ...s, qty: 1 });
            renderCart();
        };

        window.updateQty = (id, d) => {
            const item = cart.find(i => i.id === id);
            if (item) { item.qty += d; if (item.qty <= 0) window.removeFromCart(id); else renderCart(); }
        };

        window.removeFromCart = (id) => { cart = cart.filter(i => i.id !== id); renderCart(); };

        function renderCart() {
            const container = document.getElementById('cartContainer');
            if (cart.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-300 space-y-2"><i class="fa-solid fa-receipt text-4xl opacity-20"></i><p class="text-xs uppercase font-bold tracking-widest">Panier Vide</p></div>`;
                document.getElementById('cartTotal').innerText = "0.00";
                return;
            }
            let total = 0;
            let html = '<ul class="space-y-2 p-1">';
            cart.forEach(i => {
                total += i.price * i.qty;
                html += `<li class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100"><div class="flex-1"><p class="font-bold text-slate-800 text-sm">${i.name}</p><p class="text-[10px] text-slate-400">${i.price} Dh/u</p></div><div class="flex items-center gap-2"><div class="flex items-center bg-white border border-slate-200 rounded-lg"><button onclick="window.updateQty(${i.id},-1)" class="px-2 py-1 text-slate-400"><i class="fa-solid fa-minus text-[10px]"></i></button><span class="w-6 text-center font-bold text-xs">${i.qty}</span><button onclick="window.updateQty(${i.id},1)" class="px-2 py-1 text-slate-400"><i class="fa-solid fa-plus text-[10px]"></i></button></div><p class="w-14 text-right font-black text-slate-700 text-xs">${i.price*i.qty} Dh</p><button onclick="window.removeFromCart(${i.id})" class="text-red-300 hover:text-red-500 ml-1"><i class="fa-solid fa-xmark"></i></button></div></li>`;
            });
            container.innerHTML = html + '</ul>';
            document.getElementById('cartTotal').innerText = total.toFixed(2);
        }

        window.handlePayment = async (m) => {
            if (cart.length === 0) return;
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const now = new Date();
            const sale = {
                ticketNumber: dailySales.length + 1,
                date: now.toISOString().split('T')[0],
                time: now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
                items: [...cart],
                total: total,
                method: m,
                worker: activeWorker,
                timestamp: now.getTime()
            };
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sales'), sale);
                window.showPrintPreviewTicket(sale);
                cart = []; renderCart();
            } catch (e) { alert("Erreur Sync: " + e.message); }
        };

        window.showPrintPreviewTicket = (s) => {
            const d = document.getElementById('customDialog');
            document.getElementById('dialogTitle').innerText = "Ticket Validé";
            document.getElementById('dialogIcon').innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i>';
            document.getElementById('dialogMessage').innerHTML = `<div class="bg-gray-50 p-4 font-mono text-left text-xs border border-dashed border-gray-300"><p class="text-center font-bold text-lg mb-2">BARBER LAHLOU</p><p>Ticket: #${String(s.ticketNumber).padStart(4,'0')}</p><p>Staff: ${s.worker}</p><div class="border-t border-gray-200 my-2 pt-2">` + s.items.map(i=>`<div class="flex justify-between"><span>${i.qty}x ${i.name}</span><span>${i.price*i.qty} Dh</span></div>`).join('') + `</div><div class="border-t border-gray-200 mt-2 pt-2 flex justify-between font-bold text-sm"><span>TOTAL</span><span>${s.total.toFixed(2)} MAD</span></div></div>`;
            
            document.getElementById('printZone').innerHTML = `<div class="text-center mb-4"><h1 class="text-2xl font-black">BARBER LAHLOU</h1><p>Caisse Cloud Pro</p></div><div class="border-t border-b border-black border-dashed py-2 mb-2 text-xs"><p>Ticket: #${String(s.ticketNumber).padStart(4,'0')}</p><p>Date: ${s.date} ${s.time}</p><p>Staff: ${s.worker}</p></div><table class="w-full text-xs">` + s.items.map(i=>`<tr><td>${i.qty}x ${i.name}</td><td class="text-right">${i.price*i.qty} Dh</td></tr>`).join('') + `</table><div class="border-t border-black border-dashed mt-4 pt-2 flex justify-between font-bold text-lg"><span>TOTAL</span><span>${s.total.toFixed(2)} Dh</span></div>`;
            
            document.getElementById('dialogButtons').innerHTML = `<button onclick="window.closeDialog()" class="flex-1 bg-slate-100 p-3 rounded-xl font-bold">Fermer</button><button onclick="window.print()" class="flex-1 bg-slate-800 text-white p-3 rounded-xl font-bold"><i class="fa-solid fa-print"></i> Imprimer</button>`;
            d.classList.remove('hidden');
        };

        window.openReport = () => {
            const modal = document.getElementById('reportModal');
            const content = document.getElementById('reportContent');
            if (dailySales.length === 0) {
                content.innerHTML = '<div class="text-center py-20 text-slate-400"><i class="fa-solid fa-calendar-xmark text-6xl mb-4 opacity-10"></i><p class="font-bold uppercase tracking-widest">Aucune vente aujourd\'hui</p></div>';
            } else {
                const total = dailySales.reduce((s, v) => s + v.total, 0);
                let workersHTML = '';
                WORKERS.forEach(w => {
                    const wTotal = dailySales.filter(s => s.worker === w).reduce((s, v) => s + v.total, 0);
                    workersHTML += `<div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm"><p class="text-xs text-slate-400 font-bold uppercase mb-2">${w}</p><div class="flex justify-between items-end"><p class="text-2xl font-black text-slate-800">${wTotal} <small class="text-xs">Dh</small></p><p class="text-xs text-green-600 font-bold bg-green-50 px-2 py-1 rounded-lg">50% = ${wTotal/2} Dh</p></div></div>`;
                });
                content.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8"><div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl"><p class="text-slate-400 font-bold text-xs uppercase mb-1">Total l'7anout</p><p class="text-4xl font-black">${total} <small class="text-lg">MAD</small></p></div><div class="bg-blue-600 text-white p-6 rounded-3xl shadow-xl"><p class="text-blue-200 font-bold text-xs uppercase mb-1">Part Patron (50%)</p><p class="text-4xl font-black">${total/2} <small class="text-lg">MAD</small></p></div></div><h3 class="font-black text-slate-800 mb-4 uppercase text-sm tracking-widest">Détails Staff</h3><div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">${workersHTML}</div><h3 class="font-black text-slate-800 mb-4 uppercase text-sm tracking-widest">Tickets du jour</h3><div class="space-y-2">` + dailySales.slice().reverse().map(s=>`<div class="bg-white p-4 rounded-xl border border-slate-100 flex justify-between items-center shadow-sm"><div><p class="font-bold text-sm text-slate-800">#${String(s.ticketNumber).padStart(4,'0')} - ${s.worker}</p><p class="text-[10px] text-slate-400">${s.time} | ${s.items.length} services</p></div><p class="font-black text-slate-800">${s.total} Dh</p></div>`).join('') + `</div>`;
            }
            modal.classList.remove('hidden');
        };

        window.closeDialog = () => document.getElementById('customDialog').classList.add('hidden');
        window.closeReport = () => document.getElementById('reportModal').classList.add('hidden');
        window.confirmClearCart = () => { if(cart.length>0) window.showDialog('confirm','Annuler?','Effacer le ticket en cours?',()=>{cart=[];renderCart();window.closeDialog();}); };
        window.showDialog = (t,ti,m,onC) => { const d=document.getElementById('customDialog'); document.getElementById('dialogTitle').innerText=ti; document.getElementById('dialogMessage').innerText=m; document.getElementById('dialogIcon').innerHTML=t==='confirm'?'<i class="fa-solid fa-question-circle text-blue-500"></i>':''; document.getElementById('dialogButtons').innerHTML=`<button onclick="window.closeDialog()" class="flex-1 bg-slate-100 p-3 rounded-xl font-bold">Non</button><button id="diagOk" class="flex-1 bg-red-500 text-white p-3 rounded-xl font-bold">Oui</button>`; document.getElementById('diagOk').onclick=onC; d.classList.remove('hidden'); };
        window.showPrintPreview = () => { if(cart.length>0) window.handlePayment('Ticket Seul'); };

        setInterval(() => { document.getElementById('clockDisplay').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
        renderWorkers(); renderServices(); renderCart();
    </script>
</body>
</html>
