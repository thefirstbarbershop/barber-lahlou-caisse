<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahlou Élégance POS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fda4af; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Firebase Imports via CDN (Simulated environment)
        // Note: In a real GitHub deployment, these globals are provided by the environment script
        // or you would import them from https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js
        
        // Mocking Lucide icons for React in CDN context
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const COIFFURE_SERVICES = [
            { id: 'c1', name: 'Brushing', price: 40, isStarting: true, category: 'coiffure' },
            { id: 'c2', name: 'Coupe + Brushing', price: 80, isStarting: false, category: 'coiffure' },
            { id: 'c3', name: 'Pointes + Brushing', price: 80, isStarting: false, category: 'coiffure' },
            { id: 'c4', name: 'Coloration + Brushing', price: 250, isStarting: false, category: 'coiffure' },
            { id: 'c5', name: 'Méches', price: 300, isStarting: false, category: 'coiffure' },
            { id: 'c6', name: 'Ombré', price: 450, isStarting: true, category: 'coiffure' },
            { id: 'c7', name: 'Protéines', price: 450, isStarting: true, category: 'coiffure' },
            { id: 'c8', name: 'Protéines Racines', price: 250, isStarting: false, category: 'coiffure' },
            { id: 'c10', name: 'Soins Hydratants', price: 150, isStarting: true, category: 'coiffure' },
        ];

        const ESTHETIQUE_SERVICES = [
            { id: 'e1', name: 'Sourcils', price: 30, sub: 'épilation', category: 'esthetique' },
            { id: 'e19', name: 'Duvet', price: 20, sub: 'épilation', category: 'esthetique' },
            { id: 'e20', name: 'Aisselles', price: 30, sub: 'épilation', category: 'esthetique' },
            { id: 'e2', name: 'Visage', price: 70, sub: 'épilation', category: 'esthetique' },
            { id: 'e21', name: 'Maillot', price: 100, sub: 'épilation', category: 'esthetique' },
            { id: 'e3', name: 'Jambes Complètes', price: 90, sub: 'épilation', category: 'esthetique' },
            { id: 'e4', name: 'Demi-Jambes', price: 60, sub: 'épilation', category: 'esthetique' },
            { id: 'e5', name: 'Bras', price: 60, sub: 'épilation', category: 'esthetique' },
            { id: 'e6', name: 'Épilation Corps Complet', price: 250, sub: 'épilation', category: 'esthetique' },
            { id: 'e18', name: 'Vernis Normal', price: 30, sub: 'onglerie', category: 'esthetique' },
            { id: 'e7', name: 'Manucure Simple', price: 50, sub: 'onglerie', category: 'esthetique' },
            { id: 'e8', name: 'Pédicure Spa', price: 80, sub: 'onglerie', category: 'esthetique' },
            { id: 'e9', name: 'Vernis Permanent', price: 80, sub: 'onglerie', category: 'esthetique' },
            { id: 'e28', name: 'BIAB', price: 150, sub: 'onglerie', category: 'esthetique' },
            { id: 'e11', name: 'Faux Ongles + Perm.', price: 120, sub: 'onglerie', category: 'esthetique' },
            { id: 'e10', name: 'Gels + Faux Ongles', price: 200, sub: 'onglerie', category: 'esthetique' },
            { id: 'e23', name: 'Dépose', price: 50, sub: 'extra', category: 'esthetique' },
            { id: 'e24', name: 'French (doigt)', price: 5, sub: 'extra', category: 'esthetique' },
            { id: 'e25', name: 'Cat Eye (doigt)', price: 5, sub: 'extra', category: 'esthetique' },
            { id: 'e26', name: 'Design (doigt)', price: 10, sub: 'extra', category: 'esthetique' },
            { id: 'e12', name: 'Soin Visage Éclat', price: 250, isStarting: true, sub: 'soins visage', category: 'esthetique' },
            { id: 'e13', name: 'Soin Visage Profond', price: 400, isStarting: true, sub: 'soins visage', category: 'esthetique' },
            { id: 'e16', name: 'Permanent Naturel', price: 120, sub: 'les cils', category: 'esthetique' },
            { id: 'e17', name: 'Permanent Volume Russe', price: 250, sub: 'les cils', category: 'esthetique' },
            { id: 'e22', name: 'Remplissage Cils', price: 80, sub: 'les cils', category: 'esthetique' },
            { id: 'e27', name: 'Teinture Sourcils', price: 50, sub: 'les cils', category: 'esthetique' },
            { id: 'e14', name: 'Maquillage Invité', price: 300, sub: 'autre', category: 'esthetique' },
        ];

        const App = () => {
            const [view, setView] = useState('pos');
            const [activeCategory, setActiveCategory] = useState('coiffure');
            const [activeSub, setActiveSub] = useState('onglerie');
            const [cart, setCart] = useState([]);
            const [history, setHistory] = useState([]);
            const [showReceipt, setShowReceipt] = useState(null);
            const [editingItem, setEditingItem] = useState(null);
            const [dateStart, setDateStart] = useState('');
            const [dateEnd, setDateEnd] = useState('');

            // Using local persistence if Firebase is not active in this static preview
            // In your actual GitHub host, Firebase will kick in automatically
            useEffect(() => {
                const saved = localStorage.getItem('lahlou_sales');
                if (saved) setHistory(JSON.parse(saved));
            }, []);

            const currentServices = useMemo(() => {
                if (activeCategory === 'coiffure') return COIFFURE_SERVICES;
                return ESTHETIQUE_SERVICES.filter(s => s.sub === activeSub);
            }, [activeCategory, activeSub]);

            const subtotal = useMemo(() => cart.reduce((acc, item) => acc + (item.price * item.quantity), 0), [cart]);

            const addToCart = (service) => {
                const existing = cart.find(i => i.id === service.id);
                if (existing) {
                    setCart(cart.map(i => i.id === service.id ? { ...i, quantity: i.quantity + 1 } : i));
                } else {
                    setCart([...cart, { ...service, quantity: 1 }]);
                }
            };

            const updateQuantity = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQty = item.quantity + delta;
                        return newQty <= 0 ? null : { ...item, quantity: newQty };
                    }
                    return item;
                }).filter(Boolean));
            };

            const handleCheckout = () => {
                if (cart.length === 0) return;
                const now = new Date();
                const transaction = {
                    id: Date.now(),
                    dateStr: now.toLocaleString('fr-FR'),
                    dateIso: now.toISOString().split('T')[0],
                    timestamp: now.getTime(),
                    items: [...cart],
                    total: subtotal
                };
                const newHistory = [transaction, ...history];
                setHistory(newHistory);
                localStorage.setItem('lahlou_sales', JSON.stringify(newHistory));
                setShowReceipt(transaction);
                setCart([]);
            };

            const filteredHistory = useMemo(() => {
                return history.filter(tx => {
                    const txDate = tx.dateIso;
                    if (dateStart && txDate < dateStart) return false;
                    if (dateEnd && txDate > dateEnd) return false;
                    return true;
                });
            }, [history, dateStart, dateEnd]);

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white border-b border-rose-100 sticky top-0 z-30 shadow-sm px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-rose-500 rounded-2xl flex items-center justify-center shadow-lg shadow-rose-100">
                                <Icon name="scissors" className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-lg font-black text-rose-900 leading-none tracking-tighter uppercase">LAHLOU ÉLÉGANCE</h1>
                                <span className="text-[10px] text-rose-400 font-black uppercase tracking-widest">Salon POS</span>
                            </div>
                        </div>
                        <div className="flex bg-slate-100 rounded-2xl p-1 border border-slate-200">
                            <button onClick={() => setView('pos')} className={`px-4 py-2 rounded-xl text-xs font-black transition-all ${view === 'pos' ? 'bg-white text-rose-600 shadow-sm' : 'text-slate-400'}`}>VENTE</button>
                            <button onClick={() => setView('history')} className={`px-4 py-2 rounded-xl text-xs font-black transition-all ${view === 'history' ? 'bg-white text-rose-600 shadow-sm' : 'text-slate-400'}`}>HISTORIQUE</button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 lg:p-8">
                        {view === 'pos' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-8 space-y-6">
                                    <div className="flex gap-4 p-1 bg-white rounded-3xl shadow-sm border border-slate-100 w-fit">
                                        <button onClick={() => setActiveCategory('coiffure')} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-black text-sm transition-all ${activeCategory === 'coiffure' ? 'bg-rose-500 text-white shadow-lg shadow-rose-100' : 'text-slate-400 hover:bg-rose-50'}`}>
                                            <Icon name="wind" size={18} /> COIFFURE
                                        </button>
                                        <button onClick={() => setActiveCategory('esthetique')} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-black text-sm transition-all ${activeCategory === 'esthetique' ? 'bg-rose-500 text-white shadow-lg shadow-rose-100' : 'text-slate-400 hover:bg-rose-50'}`}>
                                            <Icon name="sparkles" size={18} /> ESTHÉTIQUE
                                        </button>
                                    </div>

                                    {activeCategory === 'esthetique' && (
                                        <div className="flex flex-wrap gap-2">
                                            {['onglerie', 'soins visage', 'épilation', 'les cils', 'extra', 'autre'].map((sub) => (
                                                <button key={sub} onClick={() => setActiveSub(sub)} className={`px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all border-2 ${activeSub === sub ? 'bg-rose-50 border-rose-200 text-rose-600 shadow-sm' : 'bg-white border-transparent text-slate-400 hover:border-slate-100'}`}>
                                                    {sub}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 min-h-[400px]">
                                        {currentServices.map((service) => (
                                            <button key={service.id} onClick={() => addToCart(service)} className="flex flex-col items-center justify-center p-6 bg-white border border-transparent rounded-[2.5rem] shadow-sm hover:shadow-xl hover:border-rose-200 transition-all active:scale-95 group text-center relative h-[160px]">
                                                <div className="absolute top-0 right-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="plus" className="text-rose-300" /></div>
                                                <span className="text-sm font-bold text-slate-700 mb-2 px-2 leading-tight">{service.name}</span>
                                                <span className="text-rose-500 font-black text-xl">{service.price} DH</span>
                                                {service.isStarting && <span className="text-[8px] font-black uppercase text-rose-300">À partir de</span>}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="lg:col-span-4">
                                    <div className="bg-white rounded-[2.5rem] shadow-2xl border border-rose-50 overflow-hidden sticky top-24">
                                        <div className="p-6 border-b border-slate-50 flex items-center justify-between">
                                            <h2 className="text-lg font-black flex items-center gap-2 text-slate-800 uppercase tracking-tight">
                                                <Icon name="shopping-bag" className="text-rose-500" /> Panier
                                            </h2>
                                            <span className="bg-rose-500 text-white px-3 py-1 rounded-full text-xs font-black shadow-lg shadow-rose-200">{cart.reduce((a,b) => a + b.quantity, 0)}</span>
                                        </div>

                                        <div className="p-4 max-h-[45vh] overflow-y-auto custom-scrollbar">
                                            {cart.length === 0 ? (
                                                <div className="py-20 text-center grayscale opacity-30 flex flex-col items-center">
                                                    <Icon name="shopping-bag" size={56} className="mb-4 text-rose-500" />
                                                    <p className="font-black text-slate-500 text-sm">Panier Khawi</p>
                                                </div>
                                            ) : (
                                                <div className="space-y-6">
                                                    {cart.map((item) => (
                                                        <div key={item.id} className="animate-in fade-in slide-in-from-right-2">
                                                            <div className="flex justify-between items-start mb-3">
                                                                <div className="flex-1">
                                                                    <h3 className="font-bold text-sm text-slate-800">{item.name}</h3>
                                                                    <span className="text-[10px] font-black text-rose-400 uppercase">{item.price} DH</span>
                                                                </div>
                                                                <button onClick={() => setCart(cart.filter(i => i.id !== item.id))} className="text-slate-300 hover:text-red-500 transition-colors"><Icon name="x" size={18} /></button>
                                                            </div>
                                                            <div className="flex items-center justify-between">
                                                                <div className="flex items-center gap-1 bg-slate-50 rounded-2xl p-1 border border-slate-100">
                                                                    <button onClick={() => updateQuantity(item.id, -1)} className="w-8 h-8 flex items-center justify-center rounded-xl bg-white shadow-sm text-rose-500 active:scale-90"><Icon name="minus" size={14} /></button>
                                                                    <span className="text-sm font-black min-w-[32px] text-center">{item.quantity}</span>
                                                                    <button onClick={() => updateQuantity(item.id, 1)} className="w-8 h-8 flex items-center justify-center rounded-xl bg-white shadow-sm text-rose-500 active:scale-90"><Icon name="plus" size={14} /></button>
                                                                </div>
                                                                <div className="font-black text-slate-800">{item.price * item.quantity} DH</div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        <div className="p-8 bg-rose-50/30 border-t border-rose-100">
                                            <div className="flex justify-between items-center mb-8">
                                                <span className="text-slate-500 font-black uppercase text-xs tracking-widest">Total Payé</span>
                                                <span className="text-4xl font-black text-rose-600 tracking-tighter">{subtotal} <small className="text-sm font-bold">DH</small></span>
                                            </div>
                                            <button 
                                                disabled={cart.length === 0}
                                                onClick={handleCheckout}
                                                className={`w-full py-5 rounded-[2rem] font-black text-lg flex items-center justify-center gap-3 transition-all shadow-2xl active:scale-95 ${cart.length > 0 ? 'bg-rose-500 text-white hover:bg-rose-600 shadow-rose-200' : 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'}`}
                                            >
                                                ENCAISSER <Icon name="chevron-right" size={22} />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 max-w-4xl mx-auto">
                                <div className="flex flex-col md:flex-row md:items-end justify-between gap-4 bg-white p-6 rounded-[2.5rem] shadow-sm border border-rose-50">
                                    <div className="grid grid-cols-2 gap-4 flex-1">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Du</label>
                                            <input type="date" value={dateStart} onChange={(e) => setDateStart(e.target.value)} className="w-full p-3 bg-slate-50 border-2 border-transparent focus:border-rose-200 focus:bg-white rounded-2xl outline-none font-bold text-sm transition-all" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Au</label>
                                            <input type="date" value={dateEnd} onChange={(e) => setDateEnd(e.target.value)} className="w-full p-3 bg-slate-50 border-2 border-transparent focus:border-rose-200 focus:bg-white rounded-2xl outline-none font-bold text-sm transition-all" />
                                        </div>
                                    </div>
                                    <button onClick={() => { setDateStart(''); setDateEnd(''); }} className="p-4 bg-slate-100 text-slate-500 rounded-2xl hover:bg-slate-200 transition-colors shadow-inner"><Icon name="refresh-ccw" size={20} /></button>
                                </div>

                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-rose-50 overflow-hidden">
                                    <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                                        <h2 className="text-xl font-black flex items-center gap-3 text-slate-800 uppercase tracking-tight">
                                            <div className="w-10 h-10 bg-rose-500 rounded-2xl flex items-center justify-center text-white"><Icon name="history" size={20} /></div>
                                            Historique Local
                                        </h2>
                                        <div className="text-right">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Recette Période</p>
                                            <p className="text-3xl font-black text-rose-600 tracking-tighter">{filteredHistory.reduce((a,b) => a + b.total, 0)} DH</p>
                                        </div>
                                    </div>
                                    <div className="divide-y divide-slate-50">
                                        {filteredHistory.length === 0 ? (
                                            <div className="py-24 text-center grayscale opacity-20 flex flex-col items-center">
                                                <Icon name="history" size={64} className="mx-auto mb-4" />
                                                <p className="font-black text-slate-600">Aucun enregistrement f had l-modda</p>
                                            </div>
                                        ) : (
                                            filteredHistory.map((tx) => (
                                                <div key={tx.id} className="p-6 flex items-center justify-between hover:bg-rose-50/20 transition-all group">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-12 h-12 rounded-2xl bg-slate-50 flex flex-col items-center justify-center border border-slate-100 group-hover:bg-white transition-colors">
                                                            <span className="text-[10px] font-black text-slate-400 leading-none">ID</span>
                                                            <span className="text-xs font-black text-slate-700">#{tx.id.toString().slice(-4)}</span>
                                                        </div>
                                                        <div>
                                                            <div className="font-black text-lg text-slate-800">{tx.total} DH</div>
                                                            <div className="text-xs font-bold text-rose-400 tracking-tight">{tx.dateStr}</div>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => setShowReceipt(tx)} className="w-12 h-12 flex items-center justify-center bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white rounded-2xl transition-all shadow-sm active:scale-90"><Icon name="receipt" size={22} /></button>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {showReceipt && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3.5rem] w-full max-w-md shadow-2xl overflow-hidden animate-in slide-in-from-bottom duration-500">
                                <div className="bg-rose-500 p-12 text-center text-white relative">
                                    <button onClick={() => setShowReceipt(null)} className="absolute top-8 right-8 p-2 bg-white/10 rounded-full hover:bg-white/20 transition-colors"><Icon name="x" size={20} /></button>
                                    <div className="bg-white/20 w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto mb-6 backdrop-blur-sm shadow-xl"><Icon name="check-circle-2" size={40} className="text-white" /></div>
                                    <h2 className="text-3xl font-black mb-1 uppercase tracking-tighter">Vente Réussie</h2>
                                    <p className="text-rose-100 text-sm font-bold opacity-80 uppercase tracking-widest">Lahlou Élégance</p>
                                </div>
                                <div className="p-10">
                                    <div className="text-center mb-10">
                                        <h3 className="text-2xl font-black text-rose-900 tracking-tighter uppercase">LAHLOU ÉLÉGANCE</h3>
                                        <div className="h-px bg-slate-100 w-full my-6"></div>
                                        <div className="text-[10px] text-slate-400 flex justify-between uppercase font-black tracking-widest bg-slate-50 px-5 py-2.5 rounded-full mt-4 shadow-inner">
                                            <span>Ticket N° #{showReceipt.id.toString().slice(-6)}</span>
                                            <span>{showReceipt.dateStr}</span>
                                        </div>
                                    </div>
                                    <div className="space-y-5 mb-10 overflow-y-auto max-h-[180px] pr-2 custom-scrollbar">
                                        {showReceipt.items.map((item, idx) => (
                                            <div key={idx} className="flex justify-between items-center group">
                                                <div className="flex flex-col">
                                                    <span className="text-slate-800 font-bold text-sm tracking-tight">{item.name}</span>
                                                    <span className="text-[9px] font-black text-rose-300 uppercase tracking-widest">{item.quantity} x {item.price} DH</span>
                                                </div>
                                                <span className="font-black text-slate-800 text-lg">{item.price * item.quantity} DH</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-rose-50/50 rounded-[2.5rem] p-8 flex flex-col items-center justify-center border border-rose-100/50 shadow-inner">
                                        <span className="font-black text-rose-400 uppercase tracking-widest text-[10px] mb-2">Montant Total</span>
                                        <span className="text-5xl font-black text-rose-600 tracking-tighter">{showReceipt.total} <small className="text-xl font-bold">DH</small></span>
                                    </div>
                                    <button onClick={() => setShowReceipt(null)} className="w-full mt-10 py-5 bg-slate-900 text-white rounded-[2rem] font-black text-xl hover:bg-slate-800 transition-all uppercase tracking-widest shadow-2xl active:scale-95">Fermer</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
