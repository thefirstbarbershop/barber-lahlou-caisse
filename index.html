<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahlou Élégance POS - Cloud</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fda4af; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .pin-dot { transition: all 0.2s; }
        .pin-dot.active { background-color: #f43f5e; transform: scale(1.2); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- CONFIGURATION FIREBASE ---
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyBdNRfkM94j2NWCBnnnnjYnuzjdfwKdIIk",
                authDomain: "barber-lahlou-caisse.firebaseapp.com",
                projectId: "barber-lahlou-caisse",
                storageBucket: "barber-lahlou-caisse.firebasestorage.app",
                messagingSenderId: "637483895643",
                appId: "1:637483895643:web:3aa1f4ef4463b54587a87e",
                measurementId: "G-X4FR70Q6JK"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'barber-lahlou-caisse';

        const { useState, useEffect, useMemo } = React;

        // --- STAFF PROFILES ---
        const STAFF = {
            '1212': { name: 'IMANE', role: 'worker' },
            '1122': { name: 'HIBA', role: 'worker' },
            '1010': { name: 'FAYSSAL', role: 'worker' },
            '2004': { name: 'PATRON', role: 'admin' }
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                scissors: <g><path d="M6 15a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/><path d="m14.7 10.3 5 5"/><path d="M18 15a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/><path d="M8.12 8.12 12 12"/><path d="M20 4 8.12 15.88"/><path d="M6 3a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/><path d="m5.2 5.2 4-4"/><path d="M14.7 13.7 20 19"/><path d="M18 3a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/></g>,
                wind: <g><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></g>,
                sparkles: <g><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></g>,
                plus: <g><path d="M5 12h14"/><path d="M12 5v14"/></g>,
                'shopping-bag': <g><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></g>,
                x: <g><path d="M18 6 6 18"/><path d="m6 6 12 12"/></g>,
                minus: <path d="M5 12h14"/>,
                receipt: <g><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8H8"/><path d="M16 12H8"/><path d="M15 16H9"/></g>,
                history: <g><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></g>,
                'refresh-ccw': <g><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></g>,
                'check-circle-2': <g><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></g>,
                'chevron-right': <path d="m9 18 6-6-6-6"/>,
                'log-out': <g><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></g>,
                'lock': <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></g>,
                'trash-2': <g><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></g>
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const COIFFURE_SERVICES = [
            { id: 'c1', name: 'Brushing', price: 40, isStarting: true, category: 'coiffure' },
            { id: 'c2', name: 'Coupe + Brushing', price: 80, isStarting: false, category: 'coiffure' },
            { id: 'c3', name: 'Pointes + Brushing', price: 80, isStarting: false, category: 'coiffure' },
            { id: 'c4', name: 'Coloration + Brushing', price: 250, isStarting: false, category: 'coiffure' },
            { id: 'c5', name: 'Méches', price: 300, isStarting: false, category: 'coiffure' },
            { id: 'c6', name: 'Ombré', price: 450, isStarting: true, category: 'coiffure' },
            { id: 'c7', name: 'Protéines', price: 450, isStarting: true, category: 'coiffure' },
            { id: 'c8', name: 'Protéines Racines', price: 250, isStarting: false, category: 'coiffure' },
            { id: 'c10', name: 'Soins Hydratants', price: 150, isStarting: true, category: 'coiffure' },
        ];

        const ESTHETIQUE_SERVICES = [
            { id: 'e1', name: 'Sourcils', price: 30, sub: 'épilation', category: 'esthetique' },
            { id: 'e19', name: 'Duvet', price: 20, sub: 'épilation', category: 'esthetique' },
            { id: 'e20', name: 'Aisselles', price: 30, sub: 'épilation', category: 'esthetique' },
            { id: 'e2', name: 'Visage', price: 70, sub: 'épilation', category: 'esthetique' },
            { id: 'e21', name: 'Maillot', price: 100, sub: 'épilation', category: 'esthetique' },
            { id: 'e3', name: 'Jambes Complètes', price: 90, sub: 'épilation', category: 'esthetique' },
            { id: 'e4', name: 'Demi-Jambes', price: 60, sub: 'épilation', category: 'esthetique' },
            { id: 'e5', name: 'Bras', price: 60, sub: 'épilation', category: 'esthetique' },
            { id: 'e6', name: 'Épilation Corps Complet', price: 250, sub: 'épilation', category: 'esthetique' },
            { id: 'e18', name: 'Vernis Normal', price: 30, sub: 'onglerie', category: 'esthetique' },
            { id: 'e7', name: 'Manucure Simple', price: 50, sub: 'onglerie', category: 'esthetique' },
            { id: 'e8', name: 'Pédicure Spa', price: 80, sub: 'onglerie', category: 'esthetique' },
            { id: 'e9', name: 'Vernis Permanent', price: 80, sub: 'onglerie', category: 'esthetique' },
            { id: 'e28', name: 'BIAB', price: 150, sub: 'onglerie', category: 'esthetique' },
            { id: 'e11', name: 'Faux Ongles + Perm.', price: 120, sub: 'onglerie', category: 'esthetique' },
            { id: 'e10', name: 'Gels + Faux Ongles', price: 200, sub: 'onglerie', category: 'esthetique' },
            { id: 'e23', name: 'Dépose', price: 50, sub: 'extra', category: 'esthetique' },
            { id: 'e24', name: 'French (doigt)', price: 5, sub: 'extra', category: 'esthetique' },
            { id: 'e25', name: 'Cat Eye (doigt)', price: 5, sub: 'extra', category: 'esthetique' },
            { id: 'e26', name: 'Design (doigt)', price: 10, sub: 'extra', category: 'esthetique' },
            { id: 'e12', name: 'Soin Visage Éclat', price: 250, isStarting: true, sub: 'soins visage', category: 'esthetique' },
            { id: 'e13', name: 'Soin Visage Profond', price: 400, isStarting: true, sub: 'soins visage', category: 'esthetique' },
            { id: 'e16', name: 'Permanent Naturel', price: 120, sub: 'les cils', category: 'esthetique' },
            { id: 'e17', name: 'Permanent Volume Russe', price: 250, sub: 'les cils', category: 'esthetique' },
            { id: 'e22', name: 'Remplissage Cils', price: 80, sub: 'les cils', category: 'esthetique' },
            { id: 'e27', name: 'Teinture Sourcils', price: 50, sub: 'les cils', category: 'esthetique' },
            { id: 'e14', name: 'Maquillage Invité', price: 300, sub: 'autre', category: 'esthetique' },
        ];

        const App = () => {
            const [firebaseUser, setFirebaseUser] = useState(null);
            const [activeStaff, setActiveStaff] = useState(null); // Utilisateur connecté
            const [pin, setPin] = useState('');
            const [pinError, setPinError] = useState(false);

            const [view, setView] = useState('pos');
            const [activeCategory, setActiveCategory] = useState('coiffure');
            const [activeSub, setActiveSub] = useState('onglerie');
            const [cart, setCart] = useState([]);
            const [history, setHistory] = useState([]);
            const [showReceipt, setShowReceipt] = useState(null);
            const [editingItem, setEditingItem] = useState(null);
            const [transactionToDelete, setTransactionToDelete] = useState(null);
            const [dateStart, setDateStart] = useState('');
            const [dateEnd, setDateEnd] = useState('');
            const [isSyncing, setIsSyncing] = useState(true);

            // 1. Connexion Firebase
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Erreur de connexion:", e);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setFirebaseUser);
                return () => unsubscribe();
            }, []);

            // 2. Synchronisation de l'historique
            useEffect(() => {
                if (!firebaseUser) return;
                setIsSyncing(true);
                const salesCol = collection(db, 'artifacts', appId, 'public', 'data', 'sales');
                
                const unsubscribe = onSnapshot(salesCol, (snapshot) => {
                    const salesData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    salesData.sort((a, b) => b.timestamp - a.timestamp);
                    setHistory(salesData);
                    setIsSyncing(false);
                }, (error) => {
                    console.error("Erreur de synchronisation:", error);
                    setIsSyncing(false);
                });

                return () => unsubscribe();
            }, [firebaseUser]);

            const handlePinEntry = (num) => {
                if (pin.length < 4) {
                    const newPin = pin + num;
                    setPin(newPin);
                    setPinError(false);
                    if (newPin.length === 4) {
                        verifyPin(newPin);
                    }
                }
            };

            const verifyPin = (code) => {
                if (STAFF[code]) {
                    setActiveStaff(STAFF[code]);
                    setPin('');
                } else {
                    setPinError(true);
                    setTimeout(() => {
                        setPin('');
                        setPinError(false);
                    }, 500);
                }
            };

            const handleLogout = () => {
                setActiveStaff(null);
                setCart([]);
                setView('pos');
            };

            const currentServices = useMemo(() => {
                if (activeCategory === 'coiffure') return COIFFURE_SERVICES;
                return ESTHETIQUE_SERVICES.filter(s => s.sub === activeSub);
            }, [activeCategory, activeSub]);

            const subtotal = useMemo(() => cart.reduce((acc, item) => acc + (item.price * item.quantity), 0), [cart]);

            const addToCart = (service) => {
                const existing = cart.find(i => i.id === service.id);
                if (existing) {
                    setCart(cart.map(i => i.id === service.id ? { ...i, quantity: i.quantity + 1 } : i));
                } else {
                    setCart([...cart, { ...service, quantity: 1 }]);
                }
            };

            const updateQuantity = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQty = item.quantity + delta;
                        return newQty <= 0 ? null : { ...item, quantity: newQty };
                    }
                    return item;
                }).filter(Boolean));
            };

            const handleCheckout = async () => {
                if (cart.length === 0 || !firebaseUser || !activeStaff) return;
                setIsSyncing(true);
                const now = new Date();
                const transaction = {
                    dateStr: now.toLocaleString('fr-FR'),
                    dateIso: now.toISOString().split('T')[0],
                    timestamp: now.getTime(),
                    items: [...cart],
                    total: subtotal,
                    workerName: activeStaff.name // Sauvegarde de l'employé qui a fait la vente
                };
                
                try {
                    const salesCol = collection(db, 'artifacts', appId, 'public', 'data', 'sales');
                    await addDoc(salesCol, transaction);
                    setShowReceipt({ ...transaction, id: Date.now() }); 
                    setCart([]);
                } catch (err) {
                    console.error("Erreur de sauvegarde:", err);
                    alert("Erreur de sauvegarde. Vérifiez votre connexion.");
                } finally {
                    setIsSyncing(false);
                }
            };

            const openPriceEditor = (item) => {
                setEditingItem({ ...item });
            };

            const saveCustomPrice = () => {
                if (!editingItem) return;
                setCart(cart.map(i => i.id === editingItem.id ? { ...i, price: Number(editingItem.price) } : i));
                setEditingItem(null);
            };

            const filteredHistory = useMemo(() => {
                return history.filter(tx => {
                    // Filtrage par date
                    if (dateStart && tx.dateIso < dateStart) return false;
                    if (dateEnd && tx.dateIso > dateEnd) return false;
                    
                    // Filtrage par employé (Admin voit tout, Employé voit juste sa propre caisse)
                    if (activeStaff?.role !== 'admin' && tx.workerName !== activeStaff?.name) return false;
                    
                    return true;
                });
            }, [history, dateStart, dateEnd, activeStaff]);

            const confirmDelete = async () => {
                if (!transactionToDelete) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'sales', String(transactionToDelete));
                    await deleteDoc(docRef);
                    setTransactionToDelete(null);
                } catch (error) {
                    console.error("Erreur lors de la suppression:", error);
                    setTransactionToDelete(null);
                }
            };

            // --- ÉCRAN DE CONNEXION ---
            if (!activeStaff) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl animate-fade-in">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-rose-100 rounded-[2rem] flex items-center justify-center mx-auto mb-4">
                                    <Icon name="lock" size={32} className="text-rose-500" />
                                </div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter uppercase">LAHLOU ÉLÉGANCE</h1>
                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Connexion Employé</p>
                            </div>

                            <div className={`flex justify-center gap-4 mb-8 ${pinError ? 'animate-bounce' : ''}`}>
                                {[0, 1, 2, 3].map((i) => (
                                    <div key={i} className={`w-4 h-4 rounded-full pin-dot ${i < pin.length ? 'active' : 'bg-slate-200'}`}></div>
                                ))}
                            </div>
                            {pinError && <p className="text-center text-xs font-bold text-red-500 uppercase tracking-widest mb-4">Code Incorrect</p>}

                            <div className="grid grid-cols-3 gap-3">
                                {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                                    <button key={num} onClick={() => handlePinEntry(num.toString())} className="h-16 bg-slate-50 hover:bg-slate-100 rounded-2xl text-2xl font-black text-slate-700 transition-colors active:scale-95">
                                        {num}
                                    </button>
                                ))}
                                <button onClick={() => setPin('')} className="h-16 bg-rose-50 hover:bg-rose-100 rounded-2xl text-sm font-black text-rose-500 transition-colors active:scale-95 uppercase tracking-widest">
                                    Effacer
                                </button>
                                <button onClick={() => handlePinEntry('0')} className="h-16 bg-slate-50 hover:bg-slate-100 rounded-2xl text-2xl font-black text-slate-700 transition-colors active:scale-95">
                                    0
                                </button>
                                <div className="h-16"></div> {/* Empty space */}
                            </div>
                        </div>
                    </div>
                );
            }

            // --- ÉCRAN PRINCIPAL POS ---
            return (
                <div className="min-h-screen pb-20 overflow-x-hidden">
                    <header className="bg-white border-b border-rose-100 sticky top-0 z-30 shadow-sm px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-rose-500 rounded-2xl flex items-center justify-center shadow-lg">
                                <Icon name="scissors" className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-lg font-black text-rose-900 leading-none tracking-tighter uppercase">LAHLOU ÉLÉGANCE</h1>
                                <div className="flex items-center gap-1.5 mt-0.5">
                                    <div className="w-1.5 h-1.5 rounded-full bg-green-400"></div>
                                    <span className="text-[10px] text-slate-500 font-black uppercase tracking-widest">
                                        {activeStaff.name} {activeStaff.role === 'admin' ? '(Admin)' : ''}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="flex bg-slate-100 rounded-2xl p-1 border border-slate-200 mr-2">
                                <button onClick={() => setView('pos')} className={`px-4 py-2 rounded-xl text-xs font-black transition-all ${view === 'pos' ? 'bg-white text-rose-600 shadow-sm' : 'text-slate-400'}`}>VENTE</button>
                                <button onClick={() => setView('history')} className={`px-4 py-2 rounded-xl text-xs font-black transition-all ${view === 'history' ? 'bg-white text-rose-600 shadow-sm' : 'text-slate-400'}`}>HISTORIQUE</button>
                            </div>
                            <button onClick={handleLogout} className="w-10 h-10 bg-red-50 text-red-500 hover:bg-red-500 hover:text-white rounded-2xl flex items-center justify-center transition-colors">
                                <Icon name="log-out" size={18} />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 lg:p-8">
                        {view === 'pos' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-8 space-y-6">
                                    <div className="flex gap-4 p-1 bg-white rounded-3xl shadow-sm border border-slate-100 w-fit">
                                        <button onClick={() => setActiveCategory('coiffure')} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-black text-sm transition-all ${activeCategory === 'coiffure' ? 'bg-rose-500 text-white shadow-lg' : 'text-slate-400 hover:bg-rose-50'}`}>
                                            <Icon name="wind" size={18} /> COIFFURE
                                        </button>
                                        <button onClick={() => setActiveCategory('esthetique')} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-black text-sm transition-all ${activeCategory === 'esthetique' ? 'bg-rose-500 text-white shadow-lg' : 'text-slate-400 hover:bg-rose-50'}`}>
                                            <Icon name="sparkles" size={18} /> ESTHÉTIQUE
                                        </button>
                                    </div>

                                    {activeCategory === 'esthetique' && (
                                        <div className="flex flex-wrap gap-2 animate-fade-in">
                                            {['onglerie', 'soins visage', 'épilation', 'les cils', 'extra', 'autre'].map((sub) => (
                                                <button key={sub} onClick={() => setActiveSub(sub)} className={`px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all border-2 ${activeSub === sub ? 'bg-rose-50 border-rose-200 text-rose-600 shadow-sm' : 'bg-white border-transparent text-slate-400 hover:border-slate-100'}`}>
                                                    {sub}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 min-h-[400px]">
                                        {currentServices.map((service) => (
                                            <button key={service.id} onClick={() => addToCart(service)} className="flex flex-col items-center justify-center p-6 bg-white border border-transparent rounded-[2.5rem] shadow-sm hover:shadow-xl hover:border-rose-200 transition-all active:scale-95 group text-center relative h-[160px]">
                                                <div className="absolute top-0 right-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="plus" className="text-rose-300" /></div>
                                                <span className="text-sm font-bold text-slate-700 mb-2 px-2 leading-tight">{service.name}</span>
                                                <span className="text-rose-500 font-black text-xl">{service.price} DH</span>
                                                {service.isStarting && <span className="text-[8px] font-black uppercase text-rose-300 tracking-tighter">À partir de</span>}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="lg:col-span-4">
                                    <div className="bg-white rounded-[2.5rem] shadow-2xl border border-rose-50 overflow-hidden sticky top-24">
                                        <div className="p-6 border-b border-slate-50 flex items-center justify-between">
                                            <h2 className="text-lg font-black flex items-center gap-2 text-slate-800 uppercase tracking-tight">
                                                <Icon name="shopping-bag" className="text-rose-500" /> Panier
                                            </h2>
                                            <span className="bg-rose-500 text-white px-3 py-1 rounded-full text-xs font-black shadow-lg shadow-rose-200">{cart.reduce((a,b) => a + b.quantity, 0)}</span>
                                        </div>

                                        <div className="p-4 max-h-[45vh] overflow-y-auto custom-scrollbar">
                                            {cart.length === 0 ? (
                                                <div className="py-20 text-center grayscale opacity-30 flex flex-col items-center">
                                                    <Icon name="shopping-bag" size={56} className="mb-4 text-rose-500" />
                                                    <p className="font-black text-slate-500 text-sm">Panier Vide</p>
                                                </div>
                                            ) : (
                                                <div className="space-y-6">
                                                    {cart.map((item) => (
                                                        <div key={item.id} className="animate-fade-in">
                                                            <div className="flex justify-between items-start mb-3">
                                                                <div className="flex-1">
                                                                    <h3 className="font-bold text-sm text-slate-800 leading-tight">{item.name}</h3>
                                                                    <button onClick={() => setEditingItem({...item})} className="text-[10px] font-black text-rose-400 uppercase tracking-tighter underline decoration-rose-100 underline-offset-4">{item.price} DH</button>
                                                                </div>
                                                                <button onClick={() => setCart(cart.filter(i => i.id !== item.id))} className="text-slate-300 hover:text-red-500"><Icon name="x" size={18} /></button>
                                                            </div>
                                                            <div className="flex items-center justify-between">
                                                                <div className="flex items-center gap-1 bg-slate-50 rounded-2xl p-1 border border-slate-100">
                                                                    <button onClick={() => updateQuantity(item.id, -1)} className="w-8 h-8 flex items-center justify-center rounded-xl bg-white shadow-sm text-rose-500 active:scale-90"><Icon name="minus" size={14} /></button>
                                                                    <span className="text-sm font-black min-w-[32px] text-center">{item.quantity}</span>
                                                                    <button onClick={() => updateQuantity(item.id, 1)} className="w-8 h-8 flex items-center justify-center rounded-xl bg-white shadow-sm text-rose-500 active:scale-90"><Icon name="plus" size={14} /></button>
                                                                </div>
                                                                <div className="font-black text-slate-800">{item.price * item.quantity} DH</div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        <div className="p-8 bg-rose-50/30 border-t border-rose-100">
                                            <div className="flex justify-between items-center mb-8">
                                                <span className="text-slate-500 font-black uppercase text-xs tracking-widest">Total Payé</span>
                                                <span className="text-4xl font-black text-rose-600 tracking-tighter">{subtotal} <small className="text-sm font-bold">DH</small></span>
                                            </div>
                                            <button 
                                                disabled={cart.length === 0 || isSyncing}
                                                onClick={handleCheckout}
                                                className={`w-full py-5 rounded-[2rem] font-black text-lg flex items-center justify-center gap-3 transition-all shadow-2xl active:scale-95 ${cart.length > 0 && !isSyncing ? 'bg-rose-500 text-white hover:bg-rose-600 shadow-rose-200' : 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'}`}
                                            >
                                                {isSyncing ? 'Sync...' : 'ENCAISSER'} <Icon name="chevron-right" size={22} />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 max-w-4xl mx-auto">
                                <div className="flex flex-col md:flex-row md:items-end justify-between gap-4 bg-white p-6 rounded-[2.5rem] shadow-sm border border-rose-50">
                                    <div className="grid grid-cols-2 gap-4 flex-1">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Du</label>
                                            <input type="date" value={dateStart} onChange={(e) => setDateStart(e.target.value)} className="w-full p-3 bg-slate-50 border-2 border-transparent focus:border-rose-200 focus:bg-white rounded-2xl outline-none font-bold text-sm" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Au</label>
                                            <input type="date" value={dateEnd} onChange={(e) => setDateEnd(e.target.value)} className="w-full p-3 bg-slate-50 border-2 border-transparent focus:border-rose-200 focus:bg-white rounded-2xl outline-none font-bold text-sm" />
                                        </div>
                                    </div>
                                    <button onClick={() => { setDateStart(''); setDateEnd(''); }} className="p-4 bg-slate-100 text-slate-500 rounded-2xl hover:bg-slate-200"><Icon name="refresh-ccw" size={20} /></button>
                                </div>

                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-rose-50 overflow-hidden">
                                    <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                                        <h2 className="text-xl font-black flex items-center gap-3 text-slate-800 uppercase tracking-tight">
                                            <div className="w-10 h-10 bg-rose-500 rounded-2xl flex items-center justify-center text-white"><Icon name="history" size={20} /></div>
                                            Historique ({activeStaff.name})
                                        </h2>
                                        <div className="text-right">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Recette Période</p>
                                            <p className="text-3xl font-black text-rose-600 tracking-tighter">{filteredHistory.reduce((a,b) => a + b.total, 0)} DH</p>
                                        </div>
                                    </div>
                                    <div className="divide-y divide-slate-50">
                                        {filteredHistory.length === 0 ? (
                                            <div className="py-24 text-center grayscale opacity-20 flex flex-col items-center">
                                                <Icon name="history" size={64} className="mx-auto mb-4" />
                                                <p className="font-black text-slate-600 italic">Aucune vente enregistrée</p>
                                            </div>
                                        ) : (
                                            filteredHistory.map((tx) => (
                                                <div key={tx.id} className="p-6 flex items-center justify-between hover:bg-rose-50/20 transition-all group">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-12 h-12 rounded-2xl bg-green-50 flex flex-col items-center justify-center border border-green-100 transition-colors">
                                                            <Icon name="check-circle-2" size={16} className="text-green-500" />
                                                        </div>
                                                        <div>
                                                            <div className="font-black text-lg text-slate-800">{tx.total} DH</div>
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-xs font-bold text-rose-400">{tx.dateStr}</span>
                                                                {activeStaff.role === 'admin' && (
                                                                    <span className="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-black uppercase tracking-widest">Par: {tx.workerName}</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        {activeStaff.role === 'admin' && (
                                                            <button onClick={() => setTransactionToDelete(tx.id)} className="w-12 h-12 flex items-center justify-center bg-red-50 text-red-500 hover:bg-red-500 hover:text-white rounded-2xl transition-all shadow-sm active:scale-90" title="Supprimer">
                                                                <Icon name="trash-2" size={18} />
                                                            </button>
                                                        )}
                                                        <button onClick={() => setShowReceipt(tx)} className="w-12 h-12 flex items-center justify-center bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white rounded-2xl transition-all shadow-sm active:scale-90"><Icon name="receipt" size={22} /></button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {editingItem && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-sm shadow-2xl overflow-hidden border border-rose-100 animate-fade-in">
                                <div className="p-8 pb-2 flex justify-between items-start">
                                    <div>
                                        <h3 className="text-xl font-black text-slate-800 uppercase tracking-tight">Prix Spécial</h3>
                                        <p className="text-xs font-bold text-rose-400 mt-1 italic">{editingItem.name}</p>
                                    </div>
                                    <button onClick={() => setEditingItem(null)} className="p-3 bg-slate-100 text-slate-400 rounded-2xl hover:text-rose-500"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="p-8">
                                    <div className="relative mb-8 text-center">
                                        <input 
                                            autoFocus type="number" 
                                            value={editingItem.price}
                                            onChange={(e) => setEditingItem({ ...editingItem, price: e.target.value })}
                                            className="w-full text-5xl font-black p-8 bg-slate-50 rounded-[2rem] border-2 border-transparent focus:border-rose-400 focus:bg-white focus:outline-none transition-all text-center text-rose-600 shadow-inner"
                                        />
                                        <span className="absolute bottom-4 right-8 font-black text-rose-300 text-xl">DH</span>
                                    </div>
                                    <button onClick={() => {
                                        setCart(cart.map(i => i.id === editingItem.id ? { ...i, price: Number(editingItem.price) } : i));
                                        setEditingItem(null);
                                    }} className="w-full py-6 bg-rose-500 text-white rounded-[2rem] font-black text-xl hover:bg-rose-600 transition-all shadow-xl active:scale-95 uppercase tracking-widest">Confirmer</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showReceipt && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3.5rem] w-full max-w-md shadow-2xl overflow-hidden animate-fade-in">
                                <div className="bg-rose-500 p-12 text-center text-white relative">
                                    <button onClick={() => setShowReceipt(null)} className="absolute top-8 right-8 p-2 bg-white/10 rounded-full hover:bg-white/20 transition-colors"><Icon name="x" size={20} /></button>
                                    <div className="bg-white/20 w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto mb-6 backdrop-blur-sm shadow-xl"><Icon name="check-circle-2" size={40} className="text-white" /></div>
                                    <h2 className="text-3xl font-black mb-1 uppercase tracking-tighter">Vente Cloud</h2>
                                    <p className="text-rose-100 text-sm font-bold opacity-80 uppercase tracking-widest">Par {showReceipt.workerName}</p>
                                </div>
                                <div className="p-10">
                                    <div className="text-center mb-10">
                                        <h3 className="text-2xl font-black text-rose-900 tracking-tighter uppercase">LAHLOU ÉLÉGANCE</h3>
                                        <div className="h-px bg-slate-100 w-full my-6"></div>
                                        <div className="text-[10px] text-slate-400 flex justify-between uppercase font-black tracking-widest bg-slate-50 px-5 py-2.5 rounded-full">
                                            <span>Ticket N° #{showReceipt.id ? showReceipt.id.toString().slice(-6) : 'N/A'}</span>
                                            <span>{showReceipt.dateStr}</span>
                                        </div>
                                    </div>
                                    <div className="space-y-5 mb-10 overflow-y-auto max-h-[180px] pr-2 custom-scrollbar">
                                        {showReceipt.items.map((item, idx) => (
                                            <div key={idx} className="flex justify-between items-center group">
                                                <div className="flex flex-col">
                                                    <span className="text-slate-800 font-bold text-sm tracking-tight">{item.name}</span>
                                                    <span className="text-[9px] font-black text-rose-300 uppercase tracking-widest">{item.quantity} x {item.price} DH</span>
                                                </div>
                                                <span className="font-black text-slate-800 text-lg">{item.price * item.quantity} DH</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-rose-50/50 rounded-[2.5rem] p-8 flex flex-col items-center justify-center border border-rose-100/50 shadow-inner">
                                        <span className="font-black text-rose-400 uppercase tracking-widest text-[10px] mb-2">Montant Total</span>
                                        <span className="text-5xl font-black text-rose-600 tracking-tighter">{showReceipt.total} <small className="text-xl font-bold">DH</small></span>
                                    </div>
                                    <button onClick={() => setShowReceipt(null)} className="w-full mt-10 py-5 bg-slate-900 text-white rounded-[2rem] font-black text-xl hover:bg-slate-800 transition-all uppercase tracking-widest shadow-2xl active:scale-95">Fermer</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {transactionToDelete && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl animate-fade-in text-center border border-slate-100">
                                <div className="w-20 h-20 bg-red-50 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-inner">
                                    <Icon name="trash-2" size={32} className="text-red-500" />
                                </div>
                                <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tight mb-2">Supprimer ?</h3>
                                <p className="text-sm font-bold text-slate-500 mb-8">Wesh met2eked bghiti t-ms7 had l-mbi3a? Had l-action ma-tqderch t-reje3ha.</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setTransactionToDelete(null)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-[1.5rem] font-black hover:bg-slate-200 transition-all uppercase tracking-widest">Lla</button>
                                    <button onClick={confirmDelete} className="flex-1 py-4 bg-red-500 text-white rounded-[1.5rem] font-black hover:bg-red-600 transition-all uppercase tracking-widest shadow-lg shadow-red-200 active:scale-95">Ah (Oui)</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
