    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-main: #020617;
            --accent: #3b82f6;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main);
            color: white;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
        }

        .service-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.4));
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .service-card:active { transform: scale(0.95); }
        .service-card:hover { border-color: var(--accent); background: rgba(59, 130, 246, 0.05); }

        /* PRINT STYLES */
        @media print { 
            .no-print { display: none !important; } 
            .print-only { display: block !important; } 
            body { background: white !important; color: black !important; }
            #printZone { width: 100%; max-width: 80mm; margin: 0 auto; padding: 10px; font-family: monospace; }
        }
        .print-only { display: none; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pin-dot { transition: all 0.2s ease; width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
        .pin-dot.filled { background: white; border-color: white; box-shadow: 0 0 10px white; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>

    <!-- MODAL: REPORTS & HISTORY -->
    <div id="reportsModal" class="no-print fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =========================================================================
        // DATA & CONFIG
        // =========================================================================
        const USERS = {
            '2020': { name: 'DRISS', role: 'ADMIN' },
            '1212': { name: 'SOUHAIL', role: 'WORKER' },
            '5050': { name: 'HATIM', role: 'WORKER' },
            '2356': { name: 'HAITAM', role: 'WORKER' },
            '9999': { name: 'FAYSSAL', role: 'WORKER' }
        };

        const WORKERS_LIST = ['SOUHAIL', 'HATIM', 'HAITAM', 'FAYSSAL', 'DRISS'];

        const SERVICES = [
            { id: 1, name: 'Coupe Homme', price: 50, icon: 'fa-scissors', color: 'text-blue-400' },
            { id: 2, name: 'Coupe + Barbe', price: 70, icon: 'fa-user-tie', color: 'text-indigo-400' },
            { id: 3, name: 'Tracé Barbe', price: 30, icon: 'fa-pencil', color: 'text-sky-400' },
            { id: 4, name: 'Coupe Enfant', price: 40, icon: 'fa-child', color: 'text-emerald-400' },
            { id: 5, name: 'Brushing', price: 40, icon: 'fa-wind', color: 'text-pink-400' },
            { id: 6, name: 'Soin Visage', price: 80, icon: 'fa-spa', color: 'text-teal-400' },
            { id: 7, name: 'Gommage', price: 35, icon: 'fa-hands-bubbles', color: 'text-cyan-400' },
            { id: 8, name: 'Soin Protéine', price: 300, icon: 'fa-vial-virus', color: 'text-purple-400' },
            { id: 9, name: 'Soin Kératine', price: 500, icon: 'fa-spray-can-sparkles', color: 'text-fuchsia-400' },
            { id: 10, name: 'Coloration', price: 250, icon: 'fa-palette', color: 'text-orange-400' },
            { id: 11, name: 'Pack VIP', price: 150, icon: 'fa-crown', color: 'text-amber-400', vip: true }
        ];

        let state = {
            user: null, // role: 'ADMIN' | 'WORKER', name: '...'
            activeWorker: '',
            cart: [],
            dailySales: [],
            reportSales: [],
            db: null,
            auth: null,
            appId: typeof __app_id !== 'undefined' ? __app_id : 'barber-lahlou-app'
        };

        const marocTz = { timeZone: 'Africa/Casablanca', hour12: false };

        // =========================================================================
        // UTILS
        // =========================================================================
        const getTodayISO = () => {
            const d = new Date();
            const year = new Intl.DateTimeFormat('en', { year: 'numeric', ...marocTz }).format(d);
            const month = new Intl.DateTimeFormat('en', { month: '2-digit', ...marocTz }).format(d);
            const day = new Intl.DateTimeFormat('en', { day: '2-digit', ...marocTz }).format(d);
            return `${year}-${month}-${day}`;
        };

        const getFriendlyDate = () => {
            return new Intl.DateTimeFormat('fr-FR', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric', ...marocTz }).format(new Date()).toUpperCase();
        };

        // =========================================================================
        // PIN SYSTEM LOGIC
        // =========================================================================
        let typedPin = "";
        window.keyTap = (n) => {
            if (typedPin.length < 4) {
                typedPin += n;
                updateDots();
                if (typedPin.length === 4) setTimeout(authCheck, 200);
            }
        };
        
        window.keyBack = () => { 
            typedPin = typedPin.slice(0,-1); 
            updateDots(); 
        };
        
        function updateDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => i < typedPin.length ? d.classList.add('filled') : d.classList.remove('filled'));
            document.getElementById('pinError').classList.add('invisible');
        }
        
        function authCheck() {
            const userMatch = USERS[typedPin];
            if (userMatch) {
                localStorage.setItem('bl_session', JSON.stringify(userMatch));
                startApp(userMatch);
            } else {
                document.getElementById('pinError').classList.remove('invisible');
                typedPin = "";
                updateDots();
            }
        }

        // =========================================================================
        // APP INITIALIZATION
        // =========================================================================
        async function startApp(session) {
            state.user = session;
            state.activeWorker = session.name;
            
            // UI Switch
            document.getElementById('loginScreen').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('pointer-events-none');
                document.getElementById('mainApp').classList.replace('opacity-0', 'opacity-100');
            }, 400);

            // API KEY - REMPLACE ICI "AIza..."
            const config = {
                apiKey: "AIzaSyBdNRfkM94j2NWCBnnnjYnuzjdfwKdIIK", 
                authDomain: "barber-lahlou-caisse.firebaseapp.com",
                projectId: "barber-lahlou-caisse",
                storageBucket: "barber-lahlou-caisse.firebasestorage.app",
                messagingSenderId: "637483895643",
                appId: "1:637483895643:web:3aa1f4ef4463b54587a87e"
            };

            try {
                const app = initializeApp(config);
                state.auth = getAuth(app);
                state.db = getFirestore(app);
                await signInAnonymously(state.auth);

                onAuthStateChanged(state.auth, (u) => {
                    if (u) {
                        const badge = document.getElementById('syncBadge');
                        badge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></span> Cloud Sync: ON`;
                        badge.classList.replace('text-slate-500', 'text-emerald-500');
                        
                        const q = query(collection(state.db, 'artifacts', state.appId, 'public', 'data', 'sales'), where("date", "==", getTodayISO()));
                        onSnapshot(q, (snap) => {
                            state.dailySales = [];
                            snap.forEach(d => state.dailySales.push({ id: d.id, ...d.data() }));
                            updateUI();
                        });
                    }
                });
            } catch (error) {
                console.log("Firebase connection error. Ensure API Key is correct.", error);
            }

            window.renderWorkers();
            window.renderServices();
            updateUI();
        }

        // =========================================================================
        // CORE UI UPDATES
        // =========================================================================
        function updateUI() {
            document.getElementById('displayWorker').innerText = state.activeWorker;
            document.getElementById('ticketNum').innerText = `#${String(state.dailySales.length + 1).padStart(4, '0')}`;
            
            if (state.user.role === 'ADMIN') {
                document.getElementById('roleDisplayBadge').innerText = "MODE PATRON";
            } else {
                document.getElementById('roleDisplayBadge').innerText = "VOTRE TICKET";
            }

            window.renderCart();
        }

        window.renderWorkers = () => {
            const row = document.getElementById('workerSelectionRow');
            if (state.user.role === 'ADMIN') {
                row.classList.remove('hidden');
                row.innerHTML = WORKERS_LIST.map(w => `
                    <button onclick="window.changeWorker('${w}')" class="px-8 py-3.5 rounded-2xl font-black text-[11px] uppercase tracking-widest transition-all whitespace-nowrap active:scale-95 ${state.activeWorker === w ? 'bg-blue-600 text-white shadow-xl shadow-blue-500/20' : 'glass text-slate-500 hover:text-white'}">
                        ${w}
                    </button>
                `).join('');
            } else {
                row.classList.add('hidden');
            }
        };

        window.renderServices = () => {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = SERVICES.map(s => `
                <button onclick="window.addToCart(${s.id})" class="service-card h-32 md:h-40 rounded-[2.5rem] p-5 flex flex-col justify-between items-center text-center relative group active:scale-95">
                    ${s.vip ? '<div class="absolute top-4 right-4"><i class="fa-solid fa-star text-amber-400 text-[10px]"></i></div>' : ''}
                    <div class="w-12 h-12 md:w-16 md:h-16 rounded-full bg-white/5 flex items-center justify-center mb-1 group-hover:scale-110 transition-transform">
                        <i class="fa-solid ${s.icon} ${s.color} text-xl md:text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">${s.name}</p>
                        <p class="text-sm md:text-lg font-black italic tracking-tight text-white">${Number(s.price).toFixed(2)} <small class="text-[10px] opacity-40">Dh</small></p>
                    </div>
                </button>
            `).join('');
        };

        window.renderCart = () => {
            const cont = document.getElementById('cartContainer');
            const totalEl = document.getElementById('cartTotal');
            
            if (state.cart.length === 0) {
                cont.innerHTML = ""; // VRAIMENT VIDE (Aucun texte)
                totalEl.innerText = "0.00";
                return;
            }
            
            let total = 0;
            cont.innerHTML = state.cart.map(item => {
                const s = SERVICES.find(x => x.id === item.id);
                if(!s) return '';
                total += s.price * item.qty;
                return `
                    <div class="flex items-center justify-between p-4 glass rounded-3xl animate-in mb-2 border border-white/5">
                        <div class="flex-1">
                            <p class="font-black text-[11px] uppercase italic tracking-tight text-white">${s.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold mt-0.5">${Number(s.price).toFixed(2)} MAD</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center bg-black/50 rounded-xl p-1">
                                <button onclick="window.updateQty(${s.id}, -1)" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-white transition-colors"><i class="fa-solid fa-minus text-[10px]"></i></button>
                                <span class="w-6 text-center font-black text-xs text-white">${item.qty}</span>
                                <button onclick="window.updateQty(${s.id}, 1)" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-white transition-colors"><i class="fa-solid fa-plus text-[10px]"></i></button>
                            </div>
                            <span class="w-14 text-right font-black italic text-blue-400 text-sm">${(s.price * item.qty).toFixed(2)}</span>
                        </div>
                    </div>
                `;
            }).join('');
            totalEl.innerText = total.toFixed(2);
        };

        // =========================================================================
        // ACTIONS DU PANIER (CART)
        // =========================================================================
        window.addToCart = (id) => {
            const ex = state.cart.find(i => i.id === id);
            if (ex) ex.qty++; else state.cart.push({ id, qty: 1 });
            window.renderCart();
        };

        window.updateQty = (id, delta) => {
            const ex = state.cart.find(i => i.id === id);
            if (!ex) return;
            ex.qty += delta;
            if (ex.qty <= 0) state.cart = state.cart.filter(i => i.id !== id);
            window.renderCart();
        };

        window.changeWorker = (w) => { 
            state.activeWorker = w; 
            window.renderWorkers(); 
            updateUI(); 
        };

        window.resetCart = () => {
            if (state.cart.length === 0) return;
            window.showDialog('confirm', 'Annuler ?', 'Wach bghiti tmsse7 l\'hsab o tbda mn jdid ?', () => {
                state.cart = []; 
                window.renderCart(); 
                window.closeDialog();
            });
        };

        window.logout = () => {
            window.showDialog('confirm', 'Quitter ?', 'Wach bghiti tsedd l\'caisse (Déconnexion) ?', () => {
                state.cart = []; // Empty cart on logout
                window.renderCart();
                localStorage.removeItem('bl_session');
                location.reload();
            });
        };

        window.finishSale = async (method) => {
            if (state.cart.length === 0) {
                window.showDialog('alert', 'Panier Vide', 'Ajoutez un service avant de payer.', window.closeDialog);
                return;
            }
            
            const total = state.cart.reduce((s, i) => s + (SERVICES.find(x => x.id === i.id).price * i.qty), 0);
            const sale = {
                ticketNumber: state.dailySales.length + 1,
                worker: state.activeWorker,
                items: state.cart.map(i => ({ ...SERVICES.find(x => x.id === i.id), qty: i.qty })),
                total,
                method,
                date: getTodayISO(),
                time: new Intl.DateTimeFormat('fr-FR', { hour: '2-digit', minute: '2-digit', ...marocTz }).format(new Date()),
                timestamp: Date.now()
            };

            try {
                if(state.db) {
                    await addDoc(collection(state.db, 'artifacts', state.appId, 'public', 'data', 'sales'), sale);
                }
                generatePrint(sale);
                state.cart = []; // Reset le panier a Zero
                window.renderCart(); // Force l'affichage a Zero
                window.showDialog('alert', 'C\'est fait !', `Ticket #${String(sale.ticketNumber).padStart(4, '0')} enregistré avec succès.`, window.closeDialog);
            } catch (e) {
                console.error(e);
                window.showDialog('alert', 'Erreur API', 'Verifiez votre clé Firebase.', window.closeDialog);
            }
        };

        // =========================================================================
        // IMPRESSION RAPIDE
        // =========================================================================
        window.fastPrint = () => {
            setTimeout(() => { window.print(); }, 10);
        };

        function generatePrint(sale) {
            const cont = document.getElementById('printZone');
            cont.innerHTML = `
                <div style="text-align: center; border-bottom: 2px dashed black; padding-bottom: 10px; margin-bottom: 10px;">
                    <h1 style="font-size: 20px; margin: 0; font-weight: 900;">BARBER LAHLOU</h1>
                    <p style="font-size: 10px; margin: 2px 0;">Cloud POS Premium</p>
                </div>
                <div style="font-size: 11px; margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between;"><span>Ticket:</span> <b>#${String(sale.ticketNumber).padStart(4,'0')}</b></div>
                    <div style="display: flex; justify-content: space-between;"><span>Date:</span> <b>${getTodayISO()} ${sale.time}</b></div>
                    <div style="display: flex; justify-content: space-between;"><span>Staff:</span> <b>${sale.worker}</b></div>
                </div>
                <div style="border-bottom: 1px dashed black; padding-bottom: 10px; margin-bottom: 10px;">
                    ${sale.items.map(i => `<div style="display: flex; justify-content: space-between; padding: 2px 0; font-size: 11px;"><span>${i.qty}x ${i.name}</span><span>${i.price*i.qty} Dh</span></div>`).join('')}
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 16px; font-weight: 900;">
                    <span>TOTAL:</span>
                    <span>${sale.total.toFixed(2)} Dh</span>
                </div>
                <div style="text-align: center; margin-top: 20px; font-size: 10px; font-weight: bold;">
                    MERCI DE VOTRE VISITE !
                </div>
            `;
            window.fastPrint();
        }

        window.printPreview = () => {
            if(state.cart.length === 0) return;
            const total = state.cart.reduce((s, i) => s + (SERVICES.find(x => x.id === i.id).price * i.qty), 0);
            window.showDialog('confirm', 'Aperçu', `Total: ${total.toFixed(2)} Dh pour ${state.activeWorker}. Imprimer ?`, () => {
                window.closeDialog();
                window.finishSale('Espèces');
            });
        };

        // =========================================================================
        // RAPPORTS & HISTORIQUE
        // =========================================================================
        window.openReports = () => {
            document.getElementById('reportsModal').classList.remove('hidden');
            const p = document.getElementById('reportDate');
            if(!p.value) p.value = getTodayISO();
            window.fetchDayData(p.value);
        };
        
        window.closeReports = () => document.getElementById('reportsModal').classList.add('hidden');

        let reportUnsub = null;
        window.fetchDayData = (dStr) => {
            const cont = document.getElementById('reportContent');
            cont.innerHTML = `<div class="flex justify-center py-20"><i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500"></i></div>`;
            
            if(reportUnsub) reportUnsub();

            if (!state.db) {
                 cont.innerHTML = `<p class="text-center py-20 text-rose-500 font-bold uppercase">Ajoutez l'API KEY pour voir l'historique</p>`;
                 return;
            }

            const q = query(collection(state.db, 'artifacts', state.appId, 'public', 'data', 'sales'), where("date", "==", dStr));
            reportUnsub = onSnapshot(q, (snap) => {
                state.reportSales = [];
                snap.forEach(d => state.reportSales.push({ id: d.id, ...d.data() }));
                renderReportUI();
            });
        };

        function renderReportUI() {
            const cont = document.getElementById('reportContent');
            const isPatron = state.user.role === 'ADMIN';
            
            let data = isPatron ? state.reportSales : state.reportSales.filter(s => s.worker === state.user.name);

            if (data.length === 0) {
                cont.innerHTML = `<p class="text-center py-20 text-slate-600 font-bold uppercase tracking-[0.4em] italic opacity-30">Aucun Ticket</p>`;
                return;
            }

            const globalTotal = data.reduce((s, v) => s + v.total, 0);

            let header = '';
            if (isPatron) {
                header = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-blue-600 p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                            <i class="fa-solid fa-vault absolute -right-6 -bottom-6 text-9xl opacity-10"></i>
                            <span class="text-[10px] font-black text-blue-200 uppercase tracking-[0.4em]">Recettes Globales</span>
                            <p class="text-6xl font-black italic tracking-tighter mt-2">${globalTotal.toFixed(2)} <small class="text-lg opacity-40">MAD</small></p>
                        </div>
                        <div class="bg-emerald-600 p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                            <i class="fa-solid fa-crown absolute -right-6 -bottom-6 text-9xl opacity-10"></i>
                            <span class="text-[10px] font-black text-emerald-100 uppercase tracking-[0.4em]">Part Patron (50%)</span>
                            <p class="text-6xl font-black italic tracking-tighter mt-2">${(globalTotal/2).toFixed(2)} <small class="text-lg opacity-40">MAD</small></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mt-8">
                        ${WORKERS_LIST.map(w => {
                            const t = data.filter(s => s.worker === w).reduce((s, v) => s + v.total, 0);
                            return `
                                <div class="glass p-6 rounded-[2rem] border-l-4 border-blue-500">
                                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">${w}</p>
                                    <p class="text-2xl font-black italic mt-1 text-white">${t.toFixed(2)}</p>
                                    <p class="text-[9px] font-bold text-emerald-500 mt-1 uppercase">Net: ${(t/2).toFixed(2)}</p>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            } else {
                header = `
                    <div class="bg-blue-600 p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                        <span class="text-[10px] font-black text-blue-200 uppercase tracking-[0.4em]">VOS RECETTES</span>
                        <p class="text-6xl font-black italic tracking-tighter mt-2">${globalTotal.toFixed(2)} <small class="text-lg opacity-40">MAD</small></p>
                    </div>
                `;
            }

            let tickets = `<h3 class="text-xs font-black text-slate-500 uppercase tracking-[0.3em] mb-4 mt-10">Liste des Tickets</h3><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            data.slice().sort((a,b)=>b.timestamp-a.timestamp).forEach(s => {
                let del = isPatron ? `<button onclick="window.doDelete('${s.id}')" class="w-8 h-8 rounded-full glass hover:bg-rose-500 hover:text-white text-rose-500 flex items-center justify-center transition-all ml-3"><i class="fa-solid fa-trash-can text-[10px]"></i></button>` : '';
                tickets += `
                    <div class="glass p-5 rounded-[2rem] flex justify-between items-center animate-in">
                        <div>
                            <p class="font-black text-xs italic uppercase tracking-tighter text-white">#${String(s.ticketNumber).padStart(4,'0')} - ${s.worker}</p>
                            <p class="text-[9px] font-bold text-slate-500 uppercase mt-1 tracking-widest">${s.time} | ${s.method}</p>
                        </div>
                        <div class="flex items-center">
                            <span class="text-lg font-black italic text-blue-400">${s.total.toFixed(2)} Dh</span>
                            ${del}
                        </div>
                    </div>
                `;
            });
            tickets += `</div>`;

            cont.innerHTML = header + tickets;
            document.getElementById('resetBtn').style.display = isPatron ? 'block' : 'none';
        }

        window.doDelete = (id) => {
            window.showDialog('confirm', 'Fsi ?', 'Action Irréversible.', async () => {
                await deleteDoc(doc(state.db, 'artifacts', state.appId, 'public', 'data', 'sales', id));
                window.closeDialog();
            });
        };

        window.globalReset = () => {
            window.showDialog('confirm', 'Reset Complet ?', 'Wach bghiti tmsse7 kolchi dyal lyoum ?', async () => {
                for (const s of state.reportSales) {
                    await deleteDoc(doc(state.db, 'artifacts', state.appId, 'public', 'data', 'sales', s.id));
                }
                window.closeDialog();
            });
        };

        // =========================================================================
        // DIALOG SYSTEM
        // =========================================================================
        window.showDialog = (type, title, msg, onConfirm) => {
            const m = document.getElementById('dialogModal');
            document.getElementById('dialogTitle').innerText = title;
            document.getElementById('dialogMsg').innerText = msg;
            
            const icon = document.getElementById('dialogIcon');
            icon.innerHTML = type === 'confirm' ? 
                '<div class="w-20 h-20 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto text-blue-500 text-4xl border-2 border-blue-500/20"><i class="fa-solid fa-question"></i></div>' : 
                '<div class="w-20 h-20 bg-emerald-600/10 rounded-full flex items-center justify-center mx-auto text-emerald-500 text-4xl border-2 border-emerald-500/20"><i class="fa-solid fa-check"></i></div>';
            
            const btns = document.getElementById('dialogButtons');
            btns.innerHTML = `<button onclick="window.closeDialog()" class="flex-1 py-4 rounded-2xl glass font-black uppercase text-[10px] tracking-widest text-white hover:bg-white/10 transition-all active:scale-95">Fermer</button>`;
            
            if (type === 'confirm') {
                const ok = document.createElement('button');
                ok.className = "flex-1 py-4 rounded-2xl bg-blue-600 text-white font-black uppercase text-[10px] tracking-widest shadow-lg shadow-blue-600/20 hover:bg-blue-500 transition-all active:scale-95";
                ok.innerText = "Confirmer";
                ok.onclick = onConfirm;
                btns.appendChild(ok);
            }
            m.classList.remove('hidden');
        };
        
        window.closeDialog = () => document.getElementById('dialogModal').classList.add('hidden');

        // =========================================================================
        // CLOCK AND BOOTSTRAP
        // =========================================================================
        setInterval(() => {
            const now = new Date();
            const topDate = document.getElementById('topDate');
            const topTime = document.getElementById('topTime');
            if(topDate) topDate.innerText = new Intl.DateTimeFormat('fr-FR', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric', ...marocTz }).format(now).toUpperCase();
            if(topTime) topTime.innerText = new Intl.DateTimeFormat('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit', ...marocTz }).format(now);
        }, 1000);

        const savedSession = localStorage.getItem('bl_session');
        if (savedSession) {
            startApp(JSON.parse(savedSession));
        }

    </script>
</body>
</html>
